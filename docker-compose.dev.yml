services:
  oracle-db:
    image: oracleinanutshell/oracle-xe-11g:latest
    container_name: oracle-db
    ports:
      - 1521:1521
      - 5500:5500
      - 8080:8080
    environment:
      - NLS_LANG=KOREAN_KOREA.AL32UTF8
      - ORACLE_HOME=/u01/app/oracle/product/11.2.0/xe
      - ORACLE_SID=XE
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "/u01/app/oracle/product/11.2.0/xe/bin/sqlplus -L system/oracle@XE < /dev/null 2>&1 | grep -q 'Connected to'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: publicapi
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    volumes:
      - .:/app
      - ./logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      oracle-db:
        condition: service_healthy